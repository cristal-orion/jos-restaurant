server {
    listen 4321;
    listen [::]:4321;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compressione
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Asset con hash (Astro): cache lunga e immutabile
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro output "directory": /jose -> /jose/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }
}
